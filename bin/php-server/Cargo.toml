[package]
name = "php-server"
version = "0.1.0"
authors = ["Ying kit WONG"]
license = "Apache-2.0"
edition = "2024"
description = "phprs Web Server - Execute PHP via HTTP"

[[bin]]
name = "php-server"
path = "src/main.rs"

[dependencies]
phprs = { path = "../.." }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
